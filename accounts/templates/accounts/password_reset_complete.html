{% extends 'base/base.html' %}
{% load static %}

{% block extra_head %}
    <link rel="stylesheet" href="{% static 'css/auth_pages.css' %}">
{% endblock %}

{% block content %}
    <div class="row justify-content-center align-items-center" style="min-height: 80vh;">
        <div class="col-md-6">
            <div class="card shadow-lg border-0">
                <div class="card-body p-5 text-center">
                    <img src="{% static 'img/small/voltaqua.png' %}" alt="Voltaqua" class="img-fluid mb-3" style="max-height: 60px;">
                    <h2 class="card-title fw-bold">Password Reset Complete</h2>
                    <p class="text-muted">Your password has been set. You may go ahead and log in now.</p>
                    <a href="{% url 'accounts:login' %}" class="btn btn-primary mt-3">Log In</a>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
