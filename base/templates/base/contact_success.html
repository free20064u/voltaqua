{% extends 'base/base.html' %}
{% load static %}

{% block title %}Message Sent - Voltaqua{% endblock %}

{% block extra_head %}
    <link rel="stylesheet" href="{% static 'css/auth_pages.css' %}">
{% endblock %}

{% block content %}
    <div class="row justify-content-center align-items-center" style="min-height: 80vh;">
        <div class="col-md-6">
            <div class="card shadow-lg border-0">
                <div class="card-body p-5 text-center">
                    <img src="{% static 'img/small/voltaqua.png' %}" alt="Voltaqua" class="img-fluid mb-4" style="max-height: 60px;">
                    <h2 class="card-title fw-bold">Thank You!</h2>
                    <p class="text-muted">Your message has been sent successfully. We will get back to you shortly.</p>
                    <a href="{% url 'base:home' %}" class="btn btn-primary mt-4">
                        <i class="bi bi-house-door me-2"></i>Return to Home
                    </a>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
