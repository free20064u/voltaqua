{% load static %}
<nav class="navbar navbar-expand-lg navbar-light bg-light">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="{% url 'base:home' %}">Voltaqua</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="mainNavbar">
      <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link" href="{% url 'base:home' %}">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'base:about' %}">About</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'water:home' %}">Water</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'electric:electric' %}">Electric</a></li>
        
        {% if user.is_authenticated %}
          <li class="nav-item d-flex align-items-center ms-2">
            {% if user.profile_image %}
              <img src="{{ user.profile_image.url }}" class="rounded-circle me-2" width="32" height="32" alt="avatar">
            {% endif %}
            <a class="nav-link text-dark" href="{% url 'accounts:profile' %}">Welcome, <strong>{{ user.first_name }}</strong></a>
          </li>
          <li class="nav-item ms-2">
            <form method="post" action="{% url 'accounts:logout' %}">
              {% csrf_token %}
              <button type="submit" class="btn btn-outline-danger btn-sm">Logout</button>
            </form>
          </li>
        {% else %}
          <li class="nav-item ms-2">
            <a class="btn btn-outline-primary btn-sm" href="{% url 'accounts:register' %}">Register</a>
          </li>
          <li class="nav-item ms-2">
            <a class="btn btn-primary btn-sm" href="{% url 'accounts:login' %}">Login</a>
          </li>
        {% endif %}
      </ul>
    </div>
  </div>
</nav>
